apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: credit-backend
  template:
    metadata:
      labels:
        app: credit-backend
    spec:
      containers:
        - name: backend
          image: your-registry/credit-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:password@postgres:5432/creditdb"
            - name: REDIS_URL
              value: "redis://redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: credit-backend
spec:
  selector:
    app: credit-backend
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
